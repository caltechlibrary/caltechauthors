[uwsgi]
socket = 0.0.0.0:5000
module = invenio_app.wsgi_ui:application
master = true
die-on-term = true
processes = 6
threads = 5
reload-on-rss = 1800
vacuum = true
enable-threads = true
thunder-lock = true
single-interpreter = true
lazy = true
lazy-apps = true
need-app = true
buffer-size = 65535
socket-timeout = 120
socket-write-timeout = 120
so-write-timeout = 120
so-send-timeout = 120
socket-send-timeout = 120
wsgi-disable-file-wrapper = true
