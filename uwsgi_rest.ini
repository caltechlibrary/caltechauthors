[uwsgi]
socket = 0.0.0.0:5001
module = invenio_app.wsgi_rest:application

master = true
die-on-term = true
master = true
vacuum = true
enable-threads = true
processes = 6
threads = 5
thunder-lock = true
reload-on-rss = 1800
lazy = true
lazy-apps = true
single-interpreter = true
need-app = true
mount = /api=invenio_app.wsgi_rest:application
manage-script-name = true
wsgi-disable-file-wrapper = true
buffer-size = 65535
socket-timeout = 120
socket-write-timeout = 120
so-write-timeout = 120
so-send-timeout = 120
socket-send-timeout = 120
